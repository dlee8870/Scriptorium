services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scriptorium
      POSTGRES_USER: scriptorium
      POSTGRES_PASSWORD: scriptorium
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scriptorium -d scriptorium"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - scriptorium_postgres:/var/lib/postgresql/data

volumes:
  scriptorium_postgres:
